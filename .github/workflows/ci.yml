name: CI

on:
  pull_request:
  push:

jobs:
  build:
    name: lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # ffmpeg is only needed at runtime for the proxy pipeline, not for the
      # build/typecheck. The build type-checks all routes and components.
      - run: npm ci

      - run: npm run lint

      - run: npm run build
